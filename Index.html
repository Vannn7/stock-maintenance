<!doctype html>
<html>
    
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e5f9f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stok Maintenance" />

    <title>STOK MAINTENANCE</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #e8f0fe;
        font-size: 40px;
        display: flex;
        flex-direction: column;
      }

      h2 {
        font-size: 60px;
        font-weight: 800;
        margin: 16px;
      }

      .muted {
        font-size: 40px;
        margin: 0 16px 16px;
        color: #444;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        margin: 0 16px 16px;
      }

      label {
        font-size: 40px;
        font-weight: 700;
        margin-top: 24px;
        display: block;
      }

      input,
      select {
        width: 100%;
        padding: 18px;
        font-size: 40px;
        margin-top: 10px;
        border-radius: 12px;
        border: 2px solid #dadce0;
      }

      input[readonly] {
        background: #f5f5f5;
      }

      #msg {
        margin-top: 12px;
        padding: 22px;
        border-radius: 18px;
        font-size: 45px;
        font-weight: 800;
        display: none;
        text-align: center;
        white-space: pre-line;
      }

      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #1e5f9f, #e8f0fe);
        margin: 0;
        font-size: 32px;
      }

      .header {
        text-align: center;
        padding: 50px 20px 35px;
        background: linear-gradient(135deg, #1e5f9f, #0d3c6e);
        border-bottom-left-radius: 40px;
        border-bottom-right-radius: 40px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        color: white;
      }

      .logo {
        width: 220px;
        background: white;
        padding: 15px 25px;
        border-radius: 30px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        margin-bottom: 25px;
      }

      .header h1 {
        margin: 0;
        font-size: 55px;
        font-weight: 900;
        letter-spacing: 2px;
        color: white;
      }

      .company {
        margin-top: 10px;
        font-size: 35px;
        font-weight: 500;
        opacity: 0.9;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        padding: 22px;
        margin: 18px;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.1);
      }

      button {
        background: linear-gradient(90deg, #1e5f9f, #0d3c6e);
        border-radius: 12px;
        color: #fff;
      }

      button:hover {
        opacity: 0.95;
        transform: translateY(-2px);
        transition: 0.15s ease-out;
      }

      .btn-primary {
        width: 100%;
        padding: 24px;
        font-size: 40px;
        font-weight: 900;
        border-radius: 16px; /* samakan radius dengan input */
        border: 2px solid #dadce0; /* sama seperti input */

        background: linear-gradient(90deg, #1e5f9f, #0d3c6e);
        color: #fff;

        /* 🔥 Ring putih ukuran sama seperti input */
        box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.35);

        transition: all 0.2s ease;
        margin-top: 18px;
      }

      .btn-primary:active {
        transform: scale(0.97);
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.5);
      }

      .loading-btn {
        position: relative;
        pointer-events: none;
        opacity: 0.8;
      }

      .loading-btn::after {
        content: "";
        position: absolute;
        right: 20px;
        top: 50%;
        width: 26px;
        height: 26px;
        margin-top: -13px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

#loginScreen {
  transform: scale(1.2);
  transform-origin: center;
}

#suggestBox div:hover {
  background: #1e5f9f !important;
  color: white !important;
  transform: scale(1.02);
  transition: 0.15s;
}

#suggestBox div {
  width: 100%;
}

#suggestBox div:hover {
  background: #0d3c6e !important;
  color: white !important;
  transform: scale(1.01);
}

#qty:disabled {
  background: #eee;
  color: #999;
  cursor: not-allowed;
}

#pos {
  background: white;
  color: black;
  font-weight: 600;

  border: 2px solid #dadce0;
  border-radius: 12px;
  padding: 12px;

  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  background-image: url("data:image/svg+xml;utf8,<svg fill='black' height='24' viewBox='0 0 24 24' width='24'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 15px center;
  background-size: 20px;
}

#pos:focus {
  background: #1e5f9f;
  color: white;
  outline: none;

  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24'><path d='M7 10l5 5 5-5z'/></svg>");
}

<script>
  /* ========= BEEP ENGINE ========= */
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) {
      const AudioContext =
        window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
    }
  }


document.addEventListener("click", function unlockAudio() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  document.removeEventListener("click", unlockAudio);
});


function playBeep() {

  initAudio();

  if (!audioCtx) return;

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 1000;
  gain.gain.value = 0.3;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 120);
}

function playSaveBeep() {
  if (!audioCtx) return;

  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'square';
  osc.frequency.value = 1000;
  gain.gain.value = 0.25;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  setTimeout(() => osc.stop(), 120);
}

// TARUH DI SINI ↓↓↓
function speakTransaction(type, qty) {
  if (!('speechSynthesis' in window)) return;

  const utter = new SpeechSynthesisUtterance(
type === "MASUK"
  ? `Barang masuk ${qty}`
  : `Barang keluar ${qty}`
  );

  utter.lang = "id-ID";
  utter.rate = 0.95;

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

  const msg = document.getElementById('msg');

  const elCode = document.getElementById('code');
  const elName = document.getElementById('name');
  const elType = document.getElementById('type');
  const elQty = document.getElementById('qty');
  const elCatatan = document.getElementById('catatan');
  const elPos = document.getElementById('pos');
  elQty.placeholder = "Pilih barang dulu";
  elQty.disabled = true;
  const elStok = document.getElementById('stok');
  const btnSave = document.getElementById('btnSave');

  // 🔒 Awal: tombol tidak aktif
  btnSave.disabled = true;
  btnSave.style.opacity = '0.5';

  function showLoading() {
    btnSave.disabled = true;
    btnSave.classList.add('loading-btn');
    btnSave.textContent = "Menyimpan...";
  }

  function hideLoading() {
    btnSave.disabled = false;
    btnSave.classList.remove('loading-btn');
    btnSave.textContent = "💾 Simpan Transaksi";
  }

  /* ========= MASTER LIST + SUGGEST (HP FRIENDLY) ========= */
  let MASTER = [];
  let MASTER_MAP = {};
  let MASTER_READY = false;


  
  function renderSuggest(items) {
    const box = document.getElementById('suggestBox');
    if (!box) return;

    if (!items || !items.length) {
      box.style.display = 'none';
      box.innerHTML = '';
      return;
    }

    box.innerHTML = items
      .map(it => {
        const kode = (it.code || it.barcode || '')
          .replace(/"/g, '&quot;');

        const nama = (it.name || '')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');

return `

  // Load master list sekali saat halaman dibuka
let CACHE_DURATION = 0; 

function loadMasterFast() {

  const now = Date.now();
  const cached = localStorage.getItem("MASTER_CACHE");
  const cacheTime = localStorage.getItem("MASTER_CACHE_TIME");

  // 🔥 Kalau ada cache dan belum 5 menit → pakai cache
  if (cached && cacheTime && (now - cacheTime < CACHE_DURATION)) {

    MASTER = JSON.parse(cached);
    rebuildMasterMap();
    MASTER_READY = true;
    console.log("MASTER dari CACHE");
    return;
  }

  // 🔥 Kalau tidak ada cache → ambil dari server
  google.script.run
    .withSuccessHandler(items => {

      MASTER = items || [];

      localStorage.setItem("MASTER_CACHE", JSON.stringify(MASTER));
      localStorage.setItem("MASTER_CACHE_TIME", now);

      rebuildMasterMap();
      MASTER_READY = true;

      console.log("MASTER dari SERVER");

    })
    .getMasterList();
}

function rebuildMasterMap() {

  MASTER_MAP = {};

  MASTER.forEach(it => {
    if (it.code) MASTER_MAP[it.code.toUpperCase()] = it;
    if (it.barcode) MASTER_MAP[it.barcode.toUpperCase()] = it;
  });
}

// 🔥 Jalankan saat halaman dibuka

function setMsg(text, ok = true, type = '') {

  msg.style.display = 'block';
  msg.textContent = text;

  if (!ok) {
    msg.style.background = '#fce8e6';
    msg.style.color = '#a50e0e';
    msg.style.border = '2px solid #d93025';
    return;
  }

  // 🔵 MASUK = Biru
  if (type === 'MASUK') {
    msg.style.background = '#e8f0fe';
    msg.style.color = '#0b57d0';
    msg.style.border = '2px solid #1a73e8';
  }

  // 🟢 KELUAR = Hijau
  else if (type === 'KELUAR') {
    msg.style.background = '#e6f4ea';
    msg.style.color = '#137333';
    msg.style.border = '2px solid #34a853';
  }

  // Default success
  else {
    msg.style.background = '#e6f4ea';
    msg.style.color = '#137333';
    msg.style.border = '2px solid #34a853';
  }
}

function normalizeCode(raw) {

  return (raw || '')
    .toString()
    .replace(/[\r\n\t]/g, '') // 🔥 hapus karakter scanner
    .replace(/\s+/g, '')      // 🔥 hapus semua spasi
    .trim()
    .toUpperCase();

}


function lookupMaster() {

  const clean = normalizeCode(elCode.value).toUpperCase();
  if (!clean) return;

  const item = MASTER.find(x =>
    (x.code && x.code.toUpperCase() === clean) ||
    (x.barcode && x.barcode.toUpperCase() === clean)
  );

  if (!item) {
    setMsg('Barang tidak ditemukan', false);
    return;
  }

  elName.value = item.name;
  elStok.value = item.stock;

  setMsg(`STOK TERSEDIA: ${item.stock}`, true);
}


function turboLookup(code) {

  const clean = normalizeCode(code);
  const item = MASTER_MAP[clean];

  if (!item) {
    setMsg("Barang tidak ditemukan (LOCAL)", false);
    return;
  }

  elCode.value = item.code;
  elName.value = item.name;
  elStok.value = item.stock;
  elQty.disabled = false;
elQty.placeholder = "Contoh: 3";

  // 🔥 BUKA QTY
  elQty.disabled = false;

  setMsg(`STOK TERSEDIA: ${item.stock}`, true);
}




elCode.addEventListener('input', () => {

  const code = normalizeCode(elCode.value);

  // 🔒 KUNCI QTY
  elQty.disabled = true;
elQty.placeholder = "Pilih barang dulu";

  showSuggest(code);

});


elCode.addEventListener('keydown', function (e) {

  if (e.key === 'Enter') {

    e.preventDefault(); // penting

    const finalCode = normalizeCode(elCode.value);

    turboLookup(finalCode);

    elQty.focus();

  }

});

btnSave.addEventListener('click', () => {

  initAudio();

  if (!CURRENT_USER) {
    return setMsg('Pilih petugas.', false);
  }

  const code = normalizeCode(elCode.value);
  if (!code) {
    return setMsg('Kode kosong.', false);
  }

const qtyNumber = Number(elQty.value);
if (isNaN(qtyNumber)) {
  return setMsg('Qty harus angka', false);
}

// 🔥 PINDAH KE SINI (WAJIB DI ATAS)
if (CURRENT_ROLE === "USER" && !elPos.value) {
  return setMsg("Pos / Tujuan wajib diisi!", false);
}

if (qtyNumber === 0) {
  return setMsg('Qty tidak boleh 0', false);
}

  let finalType = elType.value;

  if (CURRENT_ROLE === "USER") {
    finalType = "KELUAR";
  }

  let stokSekarang = Number(elStok.value) || 0;
  let stokBaru = stokSekarang;

  if (finalType === "MASUK") {
    stokBaru += qtyNumber;
  } else {
    if (qtyNumber > stokSekarang) {
      return setMsg(`STOK TIDAK CUKUP. STOK: ${stokSekarang}`, false);
    }
    stokBaru -= qtyNumber;
  }

// Update UI dulu (cepat)
elStok.value = stokBaru;

// suara google
speakTransaction(finalType, qtyNumber);

// tampil pesan
setMsg(
  `✅ ${elName.value}\n${finalType}: ${qtyNumber}\nSTOK TERSEDIA: ${stokBaru}`,
  true,
  finalType
);

const payload = {
  code: code,
  type: finalType,
  qty: qtyNumber,
  petugas: CURRENT_USER,
  password: window.purchasingPassword || '',
  catatan: elCatatan.value || '',
  pos: elPos.value || '' // 🔥 TAMBAH INI
};

// Reset form
elCode.value = '';
elName.value = '';
elQty.value = '';
elCatatan.value = '';
elPos.value = '';

  // Kirim ke server
google.script.run
  .withSuccessHandler(res => {

    // 🔴 Kalau server menolak
    if (!res.ok) {
      elStok.value = stokSekarang;
      setMsg(res.message || "Gagal simpan.", false);
      return;
    }
// 🟢 Kalau sukses
if (res.ok) {

  // Update stok lokal dulu
  const index = MASTER.findIndex(it => it.code === code);
  if (index !== -1) {
    MASTER[index].stock = stokBaru;
  }

  // 🔥 Refresh MASTER dari server supaya ambil stok terbaru
  google.script.run
    .withSuccessHandler(items => {

      MASTER = items || [];
      rebuildMasterMap();

      localStorage.setItem("MASTER_CACHE", JSON.stringify(MASTER));
      localStorage.setItem("MASTER_CACHE_TIME", Date.now());

      console.log("MASTER direfresh setelah transaksi");

    })
    .getMasterList();
}

  })
  .withFailureHandler(() => {
    elStok.value = stokSekarang;
    setMsg("Gagal simpan ke server.", false);
  })
  .submitTransaction(payload);

});
</script>

<script>

let dashboardChart = null;
let dashboardInterval = null;

document.getElementById("btnDashboard").addEventListener("click", function(){

  openDashboard();

  // Load pertama
  loadDashboard();

  // Auto refresh tiap 5 detik
  dashboardInterval = setInterval(loadDashboard, 1000);

});

function loadDashboard(){
  google.script.run
    .withSuccessHandler(renderDashboard)
    .getDashboardData();
}

function openDashboard(){
  document.getElementById("dashboardModal").style.display = "flex";
}

function closeDashboard(){
  document.getElementById("dashboardModal").style.display = "none";

  if (dashboardInterval) {
    clearInterval(dashboardInterval);
    dashboardInterval = null;
  }
}

function renderDashboard(data){

  const s = data.summary;
  const netColor = s.net >= 0 ? "green" : "red";

  document.getElementById("summaryBox").innerHTML = `
    <b>Total Masuk:</b> ${s.totalMasuk} <br>
    <b>Total Keluar:</b> ${s.totalKeluar} <br>
    <b style="color:${netColor}">Net:</b> ${s.net}
  `;

  const labels = data.daily.map(d => d.date);
  const masukData = data.daily.map(d => d.masuk);
  const keluarData = data.daily.map(d => d.keluar);

  const ctx = document.getElementById("chartCanvas");

  if (dashboardChart) dashboardChart.destroy();

  dashboardChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        {
          label: "MASUK",
          data: masukData,
          backgroundColor: "#1a73e8"
        },
        {
          label: "KELUAR",
          data: keluarData,
          backgroundColor: "#d93025"
        }
      ]
    },
    options: { responsive: true }
  });

}

function closeDashboard(){
  document.getElementById("dashboardModal").style.display = "none";
}

</script>
